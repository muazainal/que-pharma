<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Que-Pharma | Smart Retail Pharmacy Queue</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Outfit & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Animate.css for smooth transitions -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --bg-deep: #0B0F19;
            --card-glass: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-primary: #3B82F6;
            --accent-purple: #8B5CF6;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0, transparent 50%),
                radial-gradient(at 50% 100%, rgba(139, 92, 246, 0.1) 0, transparent 50%);
        }

        h1, h2, h3, h4, h5, h6, .navbar-brand {
            font-family: 'Outfit', sans-serif;
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .navbar {
            background: rgba(11, 15, 25, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
            padding: 1.2rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-modern {
            padding: 0.8rem 2rem;
            border-radius: 100px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary-modern {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple));
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
            color: white;
        }

        .btn-outline-modern {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-main);
        }

        .btn-outline-modern:hover {
            background: var(--card-glass);
            color: white;
        }

        /* Badge Styling */
        .badge-modern {
            padding: 0.6em 1.2em;
            border-radius: 100px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Form Controls */
        .form-control {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            color: white;
            padding: 0.8rem 1.2rem;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent-primary);
            color: white;
            box-shadow: none;
        }

        .text-muted-modern {
            color: var(--text-muted);
        }

        /* Animations */
        .reveal {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="/">Que-Pharma</a>
            <div class="d-flex align-items-center gap-3">
                {% if user.is_authenticated %}
                <div class="d-none d-sm-flex flex-column text-end me-2">
                    <span class="small text-muted-modern fw-medium">Pharmacist</span>
                    <span class="small fw-bold">{{ user.username }}</span>
                </div>
                <a href="{% url 'logout' %}" class="btn-modern btn-outline-modern py-2 px-4 shadow-sm">
                    Logout
                </a>
                {% else %}
                <a href="{% url 'login' %}" class="btn-modern btn-primary-modern py-2 px-4">
                    Pharmacist Login
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
