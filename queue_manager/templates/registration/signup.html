{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-5">
        <div class="card p-5 border-0 shadow-lg" style="border-radius: 20px;">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">Pharmacist Registration</h3>
                <p class="text-muted">Create a new pharmacist account</p>
            </div>
            <form method="post" class="needs-validation">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold small">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type|default:'text' }}" name="{{ field.name }}"
                        class="form-control rounded-pill px-4 py-2 {% if field.errors %}is-invalid{% endif %}"
                        placeholder="{{ field.label }}">
                    {% for error in field.errors %}
                    <div class="invalid-feedback">{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill py-2">Create Account</button>
                    <p class="small text-muted text-center mt-3">Already have an account? <a href="{% url 'login' %}"
                            class="text-decoration-none fw-bold">Sign In</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
