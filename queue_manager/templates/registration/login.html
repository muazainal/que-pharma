{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center pt-5 reveal">
    <div class="col-md-5">
        <div class="glass-card p-5">
            <div class="text-center mb-5">
                <h1 class="h3 fw-bold">Pharmacist Login</h1>
                <p class="text-muted-modern">Access the secure management dashboard</p>
            </div>
            
            <form method="post" class="needs-validation">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-muted-modern">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type|default:'text' }}" 
                           name="{{ field.name }}"
                           class="form-control {% if field.errors %}is-invalid{% endif %}"
                           placeholder="Enter your {{ field.label|lower }}">
                    {% for error in field.errors %}
                    <div class="invalid-feedback small">{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}
                
                <div class="d-grid mt-5">
                    <button type="submit" class="btn-modern btn-primary-modern py-3">
                        Sign In to Dashboard
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <p class="small text-muted-modern mb-0">
                    New pharmacist? <a href="{% url 'signup' %}" class="text-white fw-bold text-decoration-none border-bottom border-secondary border-2 pb-1">Create an account</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
