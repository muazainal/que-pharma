{% extends 'base.html' %}

{% block extra_css %}
<!-- Patient Portal specific styles are moved to styles.css for performance and modularity -->
{% endblock %}

{% block content %}
<!-- Patient Entrance: Search for Ticket by Phone Number -->
<div class="lookup-container reveal">
    <div class="lookup-card glass-card">
        <div class="mb-4">
            <h1 class="hero-gradient-text">Track Ticket</h1>
            <p class="text-muted-modern mt-2">Enter your phone number to see your status.</p>
        </div>

        <form id="lookupForm">
            {% csrf_token %}
            <!-- Modernized Phone Input Group with Icon and Integrated Button -->
            <div class="input-group-modern">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-muted-modern">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
                <input type="tel" id="phoneNumber" placeholder="+60123456789" required>
                <button type="submit" class="btn-modern btn-primary-modern btn-lookup">
                    Find Status
                </button>
            </div>
            
            <!-- Error Feedback: Triggered via AJAX if no ticket found -->
            <div id="errorMsg" class="text-danger small mt-3 fw-medium" style="display: none; animation: fadeIn 0.3s;">
                Ticket not found. Please try again or ask the counter.
            </div>
        </form>

        <!-- Footer Link: Redirects pharmacy staff to the login page -->
        <div class="mt-5 pt-4 border-top border-secondary border-opacity-25">
            <p class="small text-muted-modern mb-0">
                Pharmacist portal? 
                <a href="{% url 'login' %}" class="pharmacist-link">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- Logic for the ticket lookup form -->
<script>
    /**
     * Handles ticket searching via phone number
     */
    document.getElementById('lookupForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const phone = document.getElementById('phoneNumber').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        
        errorMsg.style.display = 'none';

        // Perform the lookup via API to find matching ticket ID
        fetch('/api/lookup-ticket/', {
            method: 'POST',
            body: JSON.stringify({ phone_number: phone }),
            headers: { 
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            }
        })
        .then(res => {
            if (!res.ok) throw new Error('Ticket not found');
            return res.json();
        })
        .then(data => {
            if (data.status === 'success') {
                // Redirect user to their unique tracking page
                window.location.href = `/track/${data.id}/`;
            } else {
                errorMsg.style.display = 'block';
            }
        })
        .catch(() => {
            errorMsg.style.display = 'block';
        });
    });
</script>
{% endblock %}
